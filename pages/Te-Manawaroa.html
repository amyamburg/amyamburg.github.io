<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
      <a href="../index.html">
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
      </a>
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div id = 'artDetails'>
        <h1>Te Manawaroa</h1>
        <ul>
            <li>Artists: Various</li>
            <li>Year of creation: 2019</li>
            <li>Material: Powder coated 5mm aluminium, external LED lighting</li>
        </ul>
    </div>

    <!-- art image -->
    <div class="carousel">
      <a class="prev-btn" onclick="plusSlides(-1)">&#10094;</a>

        <!-- Main slide -->
         <div class="slides fade" data-text="/resources/text/Te_Manawaroa.txt" data-audio = "/resources/audio/Te_Kuraimonoa.mp3" data-info = 'Te_Manawaroa'>
            <img src="/resources/images/artworks/Te_Manawaroa.jpg" alt="te-manawaroa" style="width:100%">
        </div>

        <!-- Slide 1-->
         <div class="slides fade" data-text="/resources/text/Te_Kuraimonoa.txt" data-audio = "/resources/audio/Te_Kuraimonoa.mp3 " data-info = 'Te_Kuraimonoa'>
            <div class="numText">1 / 9</div>
            <img src="/resources/images/artworks/Te_Kuraimonoa.jpg" style="width:100%">
         </div>

         <!-- Slide 2-->
         <div class="slides fade" data-text="/resources/text/Pātiki.txt" data-audio = "/resources/audio/Patiki.mp3" data-info = 'Pātiki'>

            <img src="/resources/images/artworks/Pātiki.jpg" style="width:100%">
         </div>

            <img src="/resources/images/artworks/Ngā_Maunga.jpg" style="width:100%">
         </div>

            <div class="numText">4 / 9</div>
            <img src="/resources/images/artworks/He_niho.jpg" style="width:100%">
         </div>

         <!-- Slide 5-->
         <div class="slides fade" data-text="/resources/text/Pou_tūārongo.txt" data-audio = "/resources/audio/Poutuarongo.mp3" data-info = 'Pou_tūārongo'>
            <div class="numText">5 / 9</div>
            <img src="/resources/images/artworks/Pou_tūārongo.jpg" style="width:100%">
         </div>

            <div class="numText">6 / 9</div>
            <img src="/resources/images/artworks/He_niho_2.jpg" style="width:100%">
         </div>

         <!-- Slide 7-->
         <div class="slides fade" data-text="/resources/text/Ngā_Waka.txt" data-audio = "/resources/audio/Nga_waka.mp3" data-info = 'Ngā_Waka'>

            <img src="/resources/images/artworks/Ngā_Waka.jpg" style="width:100%">
         </div>

         <div class="slides fade" data-text="/resources/text/Te_Moana.txt" data-audio = "/resources/audio/Te_Moana.mp3" data-info = 'Te_Moana'>

            <img src="/resources/images/artworks/Te_Moana.jpg" style="width:100%">
         </div>

         <a class="nxt-btn" onclick="plusSlides(1)">&#10095;</a>

        </div>
    </div>

    <br>

    <!-- Dots for navigation thing-->
     <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>

        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
