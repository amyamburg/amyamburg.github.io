<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div>
        <h1>Te Manawaroa</h1>
        <ul>
            <li>Artists: Various</li>
            <li>Year of creation: 2019</li>
            <li>Material: Powder coated 5mm aluminium, external LED lighting</li>
        </ul>
    </div>
    <!-- art image -->

    <div class="carousel">
        <div class="carousel-images">
            <img src="/resources/images/important/UoW_TGA_ESinclair-7.jpg" alt="Panel 1">
            <img src="/resources/images/important/UoW_TGA_ESinclair-8.jpg" alt="Panel 2">
            <img src="/resources/images/important/UoW_TGA_ESinclair-9.jpg" alt="Panel 3">
            <img src="/resources/images/important/UoW_TGA_ESinclair-10.jpg" alt="Panel 4">
            <img src="/resources/images/important/UoW_TGA_ESinclair-11.jpg" alt="Panel 5">
            <img src="/resources/images/important/UoW_TGA_ESinclair-12.jpg" alt="Panel 6">
            <img src="/resources/images/important/UoW_TGA_ESinclair-13.jpg" alt="Panel 7">
            <img src="/resources/images/important/UoW_TGA_ESinclair-14.jpg" alt="Panel 8">
            <img src="/resources/images/important/UoW_TGA_ESinclair-15.jpg" alt="Panel 9">
        </div>
        <button class="prev-btn">&#10094;</button>
        <button class="nxt-btn">&#10095;</button>
    </div>


     <!-- THIS WILL CHANGE!-->
    <div class="art-img-div">
        <img class="art-img" src="/resources/images/important/UoW_TGA_ESinclair-1.jpg" alt="te-manawaroa">

    </div>

    <!-- audio text -->
    <div id="text-div" data-file="/resources/text/Te_Manawaroa.txt">Loading text...</div>

   </div>
    <!-- map div -->
    <div class="map-div">
        <p>Map of all the art. The current one is highlighted.</p>
        <img class="map-img" src="/resources/images/map1.png" alt="first map image">

    </div>

       <!-- audio and buttons -->
       <div id="stickyFooter" class="stickToBottom">
        
        <p>loading audio controls...</p>
    </div>

    <!-- Footer Section -->
    <footer id="footer">
        <p>loading audio footer...</p>

    </footer>

    <script src="/script/script.js"></script>
</body>

</html>
