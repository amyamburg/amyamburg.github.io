<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div>
        <h1>Hine Turama & Hine-te-āhuru</h1>
        <ul>
            <li>Artists: Jamie Boynton</li>
            <li>Year of creation: 2019</li>
            <li>Material: Glass frosted artworks.</li>
        </ul>
    </div>
    <!-- art image -->
    <div class="image-container">
        <img src="/resources/images/artworks/Hine_Turama.jpg" alt="Hine_Turama" class="large-img">
        <img src="/resources/images/artworks/Hine_te_āhuru.jpg" alt="Hine-te-āhuru" class="large-img">

    </div>

    <!-- audio text -->
    <div id="text-div" data-file="/resources/text/Hine_Turama.txt">Loading text...</div>

    <!-- map div -->
    <div class="map-div">
        <img class="map-img" src="/resources/images/maps/TGAMapE.png" alt="Map Of The Self Guided CulturalTour">
    </div>

       <!-- audio and buttons -->
       <div id="stickyFooter" class="stickToBottom">
        
        <p>loading audio controls...</p>
    </div>

    <!-- Footer Section -->
    <footer id="footer">
        <p>loading audio footer...</p>

    </footer>

    <script src="/script/script.js"></script>
</body>

</html>
