<!DOCTYPE html>
<html lang="en">

<head>
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div>
        <h1>Te Poutokomanawa</h1>
        <ul>
            <li>Artist name: Whare Thompson</li>
            <li>Year of creation: 2019</li>
            <li>Material: Powder coated 5mm aluminium, external LED lighting</li>
        </ul>
    </div>
    <!-- art image -->
    <div class="art-img-div">
        <img class="art-img" src="/resources/images/art1.jpg" alt="first art image">

    </div>

    <!-- audio text -->
    <div id="text-div" data-file="/resources/text/Te_Poutokomanawa.txt">Loading text...</div>

     <!-- audio and buttons -->
     <div class="stickToBottom">
        <!-- Audio file.-->
        <audio id="audioPlayer">
           <source src="/resources/UoW_Tga_GivenRecording.mp3" type="audio/mp3">
       </audio>
       <div class="custom-controls">
           <button class="control-btn" id="playPauseBtn">Play</button>
           <input type="range" id="seekBar" value="0" step="1" min="0">
       </div>

       <!-- Buttons-->
       <div class="button-container">    
           <button class="footer-btn" id="prev-button">&#8249;</button>
           <button class="footer-btn" id="next-button">&#8250;</button>
        </div>
   </div>
    <!-- map div -->
    <div class="map-div">
        <p>Map of all the art. The current one is highlighted.</p>
        <img class="map-img" src="/resources/images/map1.png" alt="first map image">

    </div>

    <!-- Footer Section -->
    <footer>
        <p>i dont know what we need to put here tbh</p>

    </footer>

    <script src="/script/script.js"></script>
</body>

</html>
