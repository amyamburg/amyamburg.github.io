<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div>
        <h1>Ngā Maunga</h1>
        <ul>
            <li>Artist: James Tapiata</li>
            <li>Year of creation: 2019</li>
            <li>Material: Swamp kauri backed with 3mm aluminium with vinyl film possibly</li>
        </ul>
    </div>
    <!-- art image -->
    <div class="art-img-div">
        <img class="art-img" src="/resources/images/important/UoW_TGA_ESinclair-9.jpg" alt="Nga-Maunga">

    </div>

    <!-- audio text -->
    <div id="text-div" data-file="/resources/text/Ngā_Maunga.txt">Loading text...</div>

    <!-- map div -->
    <div class="map-div">
        <p>Map of all the art. The current one is highlighted.</p>
        <img class="map-img" src="/resources/images/map1.png" alt="first map image">

    </div>

       <!-- audio and buttons -->
       <div id="stickyFooter" class="stickToBottom">
        
        <p>loading audio controls...</p>
    </div>

    <!-- Footer Section -->
    <footer id="footer">
        <p>loading audio footer...</p>

    </footer>

    <script src="/script/script.js"></script>
</body>

</html>
