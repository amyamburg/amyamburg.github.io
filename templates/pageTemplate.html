<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Guided Cultural Tour</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <a href="../index.html">
        <img class="logo-img" src="/resources/images/Uni_logo.png" alt="Waikato Universiy Logo">
        </a>
        <h1>Self-Guided Cultural Tour</h1>
    </header>
    <!-- art info -->
    <div>
        <h1>#PutNameOfArtworkHere</h1>
        <ul>
            <li>Artist name: #PutArtistNameHere</li>
            <li>Year of creation: #PutTheYearTheArtWorkWasMadeHere</li>
            <li>Material: #PutArtWorksMaterialHere</li>
        </ul>
    </div>
    <!-- art image -->
    <div class="art-img-div">
        <!-- art image -->
        <img class="art-img" src="/#PutFilePathOfArtWorksImageHere" alt="#PutNameOfArtworkHere">

    </div>

    <!-- audio text -->
    <div id="text-div" data-file="/#PutFilePathOfArtWorksTextHere">Loading text...</div>

    <div class="map-div">
        <img class="map-img" src="/#PutFilePathOfArtWorksMapHere" alt="Map Of The Self Guided CulturalTour">
    </div>

<!-- audio and buttons -->
<div id="stickyFooter" class="stickToBottom" data-audio="/#PutFilePathOfAudioRecordingHere">   
    <p>loading audio controls...</p>
</div>

<!-- Footer Section -->
<footer id="footer">
    <p>loading audio footer...</p>

</footer>

    <script src="/script/script.js"></script>
</body>

</html>
